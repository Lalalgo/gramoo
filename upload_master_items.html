const log = document.getElementById('log');
function addLog(msg, cls='') { log.innerHTML += `<span class="${cls}">${msg}</span>\n`; log.scrollTop=log.scrollHeight; }

// Login required for Firestore write
let currentUser = null;
onAuthStateChanged(auth, u => { currentUser = u; });

window.startUpload = async function() {
    if (!currentUser) {
        addLog('🔐 Pehle Admin login karo...', 'info');
        try {
            const prov = new GoogleAuthProvider();
            prov.setCustomParameters({ prompt: 'select_account' });
            const result = await signInWithPopup(auth, prov);
            addLog(`✅ Login: ${result.user.email}`, 'ok');
        } catch(e) { addLog('❌ Login failed: ' + e.message, 'err'); return; }
    }

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Upload ho raha hai...';
    addLog(`\n🚀 Upload shuru — ${MASTER.length} items\n`, 'info');

    let success = 0, failed = 0;
    for (const item of MASTER) {
        try {
            const { id, ...data } = item;
            data.nameHi = data.hi; data.nameEn = data.en;
            delete data.hi; delete data.en;
            data.addedBy = 'admin_bulk';
            data.createdAt = serverTimestamp();
            await setDoc(doc(db, 'masterItems', id), data);
            addLog(`  ✅ ${item.hi}`, 'ok');
            success++;
        } catch(e) {
            addLog(`  ❌ ${item.hi} — ${e.message}`, 'err');
            failed++;
        }
        await new Promise(r => setTimeout(r, 80));
    }

    addLog(`\n🎉 Complete! ✅ ${success} uploaded, ❌ ${failed} failed`, success===MASTER.length?'ok':'err');
    btn.textContent = '✅ Upload Complete!';
};

window.checkExisting = async function() {
    if (!currentUser) { addLog('Pehle login karo', 'err'); return; }
    addLog('\n🔍 Firebase mein check kar raha hai...', 'info');
    try {
        const snap = await getDocs(collection(db, 'masterItems'));
        addLog(`📦 ${snap.size} items already hai masterItems mein:`, 'info');
        snap.forEach(d => addLog(`  • ${d.data().nameHi || d.id}`, 'ok'));
    } catch(e) { addLog('Error: ' + e.message, 'err'); }
};
</script>
